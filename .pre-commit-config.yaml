repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: ['--select=E,F,W', '--ignore=E501,E402,E701,E731,F841,F541', '--target-version=py39']
        files: ^scripts/

  - repo: https://github.com/pylint-dev/pylint
    rev: v3.3.6
    hooks:
      - id: pylint
        # Disable list grouped: C,R = style/refactor (off by policy).
        # W06* = unused var/arg/redefine/except-without-check (existing).
        # W0108 unnecessary-lambda, W0212 protected-access, W0603 global-statement,
        # W0640 cell-var-from-loop, W1309 f-string-without-interpolation,
        # W1510 subprocess-run-check, W1514 unspecified-encoding,
        # I1101 c-extension-no-member (lxml), E0401 import-error (optional deps
        # like curl_cffi), E0606 possibly-used-before-assignment, E0611
        # no-name-in-module (db layer re-exports). Pre-existing cruft as of
        # 2026-04-13 Phase 0-A baseline — see ROADMAP for cleanup tickets.
        args:
          - '--disable=C,R,W0108,W0212,W0603,W0611,W0612,W0613,W0621,W0622,W0640,W0702,W0718,W1309,W1510,W1514,I1101,E0401,E0606,E0611'
          - '--max-line-length=120'
        files: ^scripts/
        additional_dependencies: [duckdb, requests, rapidfuzz, flask, openpyxl, pandas, lxml]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        # Quote the --skip value: in YAML flow style the comma is a list
        # separator, so `[--skip=B101,B608]` parses as three items and
        # bandit sees `B608` as a positional file path, silently dropping
        # the B608 skip. Quoting keeps the comma inside the scalar.
        #
        # Skips: B101 assert_used, B108 hardcoded_tmp, B110 try_except_pass,
        # B310 urlopen, B404 subprocess import, B603 subprocess-without-shell,
        # B607 start_process_with_partial_path, B608 SQL-string-construction.
        # All pre-existing cruft as of 2026-04-13 Phase 0-A baseline — see
        # ROADMAP for cleanup tickets.
        args: [-r, "--skip=B101,B108,B110,B310,B404,B603,B607,B608"]
        files: ^scripts/

# NOTE: semgrep not included — broken install on Python 3.9/macOS
# (pysemgrep binary missing). Revisit when upgrading to Python 3.11+.

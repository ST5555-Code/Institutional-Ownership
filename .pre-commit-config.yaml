repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: ['--select=E,F,W', '--ignore=E501,E402,E701,E702,E731,F841,F541', '--target-version=py39']
        files: ^scripts/

  - repo: https://github.com/pylint-dev/pylint
    rev: v3.3.6
    hooks:
      - id: pylint
        args: ['--disable=C,R,W0611,W0612,W0613,W0621,W0622,W0702,W0718', '--max-line-length=120']
        files: ^scripts/
        additional_dependencies: [duckdb, requests, rapidfuzz, flask, openpyxl, pandas, lxml]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        # Quote the --skip value: in YAML flow style the comma is a list
        # separator, so `[--skip=B101,B608]` parses as three items and
        # bandit sees `B608` as a positional file path, silently dropping
        # the B608 skip. Quoting keeps the comma inside the scalar.
        args: [-r, "--skip=B101,B608"]
        files: ^scripts/

# NOTE: semgrep not included — broken install on Python 3.9/macOS
# (pysemgrep binary missing). Revisit when upgrading to Python 3.11+.

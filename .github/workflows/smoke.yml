name: smoke

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      # Runtime dependencies for scripts/app.py at import time. Keep this
      # minimal — only the subset needed to boot Flask and run the 4 smoke
      # endpoints against the fixture DB. Versions pinned to match
      # requirements.txt.
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            duckdb==1.4.4 \
            fastapi==0.115.4 \
            httpx==0.28.1 \
            jinja2==3.1.6 \
            lxml==5.3.0 \
            pandas==2.3.3 \
            pydantic==2.12.5 \
            pyyaml==6.0.3 \
            requests==2.32.5 \
            openpyxl==3.1.5 \
            rapidfuzz==3.13.0 \
            tabulate==0.9.0 \
            tqdm==4.67.3 \
            uvicorn==0.39.0 \
            pytest==8.3.3

      - name: Verify fixture DB committed
        run: |
          test -f tests/fixtures/13f_fixture.duckdb \
            || (echo "Missing tests/fixtures/13f_fixture.duckdb — run scripts/build_fixture.py and commit it" && exit 1)
          ls -lh tests/fixtures/13f_fixture.duckdb

      - name: Run tests
        run: pytest tests/smoke/ tests/pipeline/ -v

      # mig-08-p1: warning-only staleness gate. Reads _fixture_metadata.built_at
      # written by scripts/build_fixture.py. If the table is missing (older
      # fixture) or the fixture is >30 days old, prints a WARNING but never
      # fails CI. Hardening to a blocking gate is deferred to mig-08a.
      - name: Fixture staleness check (warning only)
        if: always()
        run: |
          python - <<'PY'
          import datetime as dt
          import duckdb

          path = "tests/fixtures/13f_fixture.duckdb"
          con = duckdb.connect(path, read_only=True)
          try:
              row = con.execute(
                  "SELECT built_at FROM _fixture_metadata LIMIT 1"
              ).fetchone()
          except duckdb.CatalogException:
              print(
                  "::warning::_fixture_metadata table missing in "
                  f"{path}; rebuild fixture via scripts/build_fixture.py "
                  "to enable staleness tracking"
              )
              raise SystemExit(0)
          finally:
              con.close()

          if row is None or row[0] is None:
              print(
                  "::warning::_fixture_metadata.built_at is empty; "
                  "rebuild fixture via scripts/build_fixture.py"
              )
              raise SystemExit(0)

          built_at = row[0]
          if isinstance(built_at, str):
              built_at = dt.datetime.fromisoformat(built_at)
          now = dt.datetime.now(built_at.tzinfo) if built_at.tzinfo else dt.datetime.now()
          age_days = (now - built_at).days
          if age_days > 30:
              print(
                  f"::warning::Fixture is {age_days} days old "
                  f"(built {built_at}); consider rebuilding via "
                  "scripts/build_fixture.py"
              )
          else:
              print(f"Fixture age OK: {age_days} days (built {built_at})")
          PY

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13F Institutional Ownership Research</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <h1 class="header-title">Institutional Ownership Research</h1>
            <div class="search-bar">
                <div class="search-input-wrap">
                    <input type="text" id="ticker-input" placeholder="Ticker or company name..." autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
                    <div id="autocomplete-dropdown" class="autocomplete-dropdown"></div>
                </div>
                <button id="load-btn" class="btn btn-primary">Load</button>
            </div>
        </div>
    </header>

    <!-- Summary Card -->
    <div id="summary-card" class="summary-card hidden">
        <div class="summary-grid">
            <div class="summary-item">
                <span class="summary-label">Company</span>
                <span class="summary-value" id="sum-company">—</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Latest Quarter</span>
                <span class="summary-value" id="sum-quarter">—</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Inst. Holdings</span>
                <span class="summary-value" id="sum-holdings">—</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">% Float Held</span>
                <span class="summary-value" id="sum-float">—</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Holders</span>
                <span class="summary-value" id="sum-holders">—</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Active / Passive</span>
                <span class="summary-value" id="sum-split">—</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Market Cap</span>
                <span class="summary-value" id="sum-mktcap">—</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Price</span>
                <span class="summary-value" id="sum-price">—</span>
            </div>
            <div class="summary-item" title="Covers mutual funds and ETFs filing N-PORT. Some ETF holdings (certain iShares, Vanguard ETFs) may not be available. Sub-adviser positions deduplicated to avoid double-counting.">
                <span class="summary-label" style="cursor:help;border-bottom:1px dotted #999;">N-PORT Coverage</span>
                <span class="summary-value" id="sum-nport">—</span>
            </div>
        </div>
    </div>

    <!-- Tab Bar -->
    <div id="tab-container" class="tab-container hidden">
        <div class="tab-bar">
            <button class="tab active" data-tab="register">Register</button>
            <button class="tab" data-tab="ownership-trend">Ownership Trend</button>
            <button class="tab" data-tab="flow-analysis">Flow Analysis</button>
            <button class="tab" data-tab="conviction">Conviction</button>
            <button class="tab" data-tab="short-analysis">Short Interest</button>
            <button class="tab" data-tab="activist">Activist</button>
            <button class="tab" data-tab="fund-portfolio">Fund Portfolio</button>
            <button class="tab" data-tab="cross-ownership">Cross-Ownership</button>
            <button class="tab" data-tab="short-squeeze">Short Squeeze</button>
            <button class="tab" data-tab="sector-rotation">Sector Rotation</button>
            <!-- AUM now shown on Register tab -->
        </div>

        <!-- Action buttons -->
        <div class="action-bar">
            <button id="copy-btn" class="btn btn-secondary">Copy</button>
            <button id="export-btn" class="btn btn-secondary">Export Excel</button>
            <button id="print-btn" class="btn btn-secondary" onclick="window.print()">Print / PDF</button>
        </div>

        <!-- Cross-Ownership controls (Query 8 only) -->
        <div id="cross-ownership-panel" class="cross-ownership-panel hidden">
            <div class="co-peer-group" style="margin-bottom:8px;display:flex;align-items:center;gap:8px;">
                <span style="font-size:12px;color:#666;">Load peer group:</span>
                <select id="co-peer-select" style="font-size:12px;padding:3px 6px;border:1px solid #ccc;border-radius:4px;">
                    <option value="">Select...</option>
                </select>
                <span style="font-size:11px;color:#999;">or add tickers manually below</span>
            </div>
            <div class="co-header">
                <span class="co-label">Companies (up to 10):</span>
                <div class="co-toggle">
                    <label class="toggle-switch">
                        <input type="checkbox" id="co-active-toggle">
                        <span class="toggle-label" id="co-toggle-label">All Institutions</span>
                    </label>
                </div>
            </div>
            <div class="co-ticker-grid">
                <div class="co-ticker-item co-primary">
                    <input type="text" id="co-ticker-0" class="co-ticker-input" readonly>
                </div>
                <div class="co-ticker-item"><div class="co-input-wrap"><input type="text" class="co-ticker-input" data-idx="1" placeholder="Ticker..." autocomplete="off"><button class="co-clear" data-idx="1">&times;</button></div></div>
                <div class="co-ticker-item"><div class="co-input-wrap"><input type="text" class="co-ticker-input" data-idx="2" placeholder="Ticker..." autocomplete="off"><button class="co-clear" data-idx="2">&times;</button></div></div>
                <div class="co-ticker-item"><div class="co-input-wrap"><input type="text" class="co-ticker-input" data-idx="3" placeholder="Ticker..." autocomplete="off"><button class="co-clear" data-idx="3">&times;</button></div></div>
                <div class="co-ticker-item"><div class="co-input-wrap"><input type="text" class="co-ticker-input" data-idx="4" placeholder="Ticker..." autocomplete="off"><button class="co-clear" data-idx="4">&times;</button></div></div>
                <div class="co-ticker-item"><div class="co-input-wrap"><input type="text" class="co-ticker-input" data-idx="5" placeholder="Ticker..." autocomplete="off"><button class="co-clear" data-idx="5">&times;</button></div></div>
                <div class="co-ticker-item"><div class="co-input-wrap"><input type="text" class="co-ticker-input" data-idx="6" placeholder="Ticker..." autocomplete="off"><button class="co-clear" data-idx="6">&times;</button></div></div>
                <div class="co-ticker-item"><div class="co-input-wrap"><input type="text" class="co-ticker-input" data-idx="7" placeholder="Ticker..." autocomplete="off"><button class="co-clear" data-idx="7">&times;</button></div></div>
                <div class="co-ticker-item"><div class="co-input-wrap"><input type="text" class="co-ticker-input" data-idx="8" placeholder="Ticker..." autocomplete="off"><button class="co-clear" data-idx="8">&times;</button></div></div>
            </div>
            <button id="co-analyze-btn" class="btn btn-primary">Analyze</button>
            <div class="co-views">
                <button class="co-view-btn active" data-view="anchor">Top Holders by Company</button>
                <button class="co-view-btn" data-view="top">Top Investors Across Group</button>
            </div>
            <div id="co-anchor-bar" class="co-anchor-bar">
                <span>Viewing top 25 holders of:</span>
                <select id="co-anchor-select"></select>
            </div>
        </div>

        <!-- Manager selector (Query 7 only) -->
        <div id="manager-selector" class="manager-selector hidden">
            <label for="manager-dropdown">Select Manager:</label>
            <select id="manager-dropdown"></select>
            <button id="load-portfolio-btn" class="btn btn-primary">Load Portfolio</button>
        </div>

        <!-- Results area -->
        <div id="results-area" class="results-area">
            <div id="loading-spinner" class="spinner hidden">
                <div class="spinner-ring"></div>
                <span>Loading...</span>
            </div>
            <div id="results-table-wrap"></div>
            <div id="error-msg" class="error-msg hidden"></div>
        </div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
        <p>Enter a ticker above to begin.</p>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
